<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — GroupUp</title>
  <meta name="description" content="Request a password reset link for your GroupUp account.">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-body" data-page="forgot">

  <!-- ── Toast Container ── -->
  <div id="toast-container" class="toast-container"></div>

  <!-- ═══════════════════════════════════════════════════════
       LEFT PANEL — Branding
  ════════════════════════════════════════════════════════ -->
  <div class="auth-panel-left" role="complementary" aria-label="Branding">
    <div class="auth-panel-illustration">

      <div class="auth-brand">
        <div class="auth-brand-icon" aria-hidden="true">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="9" cy="7" r="4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="auth-brand-name">GroupUp</span>
      </div>

      <div class="auth-visual" aria-hidden="true">
        <svg viewBox="0 0 260 260" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="130" cy="130" r="110" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
          <circle cx="130" cy="130" r="30" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
          <path d="M98 130h64" stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-linecap="round"/>
          <path d="M130 98v64" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round"/>
          <circle cx="70" cy="90" r="16" fill="rgba(255,255,255,0.14)"/>
          <circle cx="190" cy="90" r="16" fill="rgba(255,255,255,0.14)"/>
          <circle cx="70" cy="170" r="16" fill="rgba(255,255,255,0.14)"/>
          <circle cx="190" cy="170" r="16" fill="rgba(255,255,255,0.14)"/>
        </svg>
      </div>

      <h1 class="auth-tagline">Reset Your Access</h1>
      <p class="auth-subline">Enter your FAST email and we will send a secure reset link.</p>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════
       RIGHT PANEL — Reset Request
  ════════════════════════════════════════════════════════ -->
  <div class="auth-panel-right">
    <div class="auth-form-container">

      <div class="auth-form-header">
        <a href="login.html" class="auth-form-back" aria-label="Back to login">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          Back to Login
        </a>
        <h2 class="auth-form-title">Forgot Password</h2>
        <p class="auth-form-subtitle">We will email you a link to reset your password.</p>
      </div>

      <div class="auth-form" style="display:flex; flex-direction:column; gap:18px;">
        <div class="form-group">
          <label class="form-label" for="reset-email">Student Email</label>
          <div class="form-input-icon-wrap">
            <span class="input-icon" aria-hidden="true">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </span>
            <input type="email" id="reset-email" class="form-input" placeholder="f230000@cfd.nu.edu.pk" autocomplete="email">
          </div>
          <span class="form-error" id="err-reset-email"></span>
        </div>

        <div class="auth-form-actions">
          <button type="button" id="submit-forgot" class="btn btn-primary">
            Send Reset Link
          </button>
        </div>
      </div>

      <p class="auth-footer-text">Remembered your password? <a href="login.html">Sign in</a></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.50.0/dist/umd/supabase.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
