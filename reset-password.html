<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — GroupUp</title>
  <meta name="description" content="Set a new password for your GroupUp account.">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-body" data-page="reset">

  <!-- ── Toast Container ── -->
  <div id="toast-container" class="toast-container"></div>

  <!-- ═══════════════════════════════════════════════════════
       LEFT PANEL — Branding
  ════════════════════════════════════════════════════════ -->
  <div class="auth-panel-left" role="complementary" aria-label="Branding">
    <div class="auth-panel-illustration">

      <div class="auth-brand">
        <div class="auth-brand-icon" aria-hidden="true">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="9" cy="7" r="4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="auth-brand-name">GroupUp</span>
      </div>

      <div class="auth-visual" aria-hidden="true">
        <svg viewBox="0 0 260 260" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="130" cy="130" r="110" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
          <path d="M90 150c0-22 18-40 40-40s40 18 40 40" stroke="rgba(255,255,255,0.5)" stroke-width="6" stroke-linecap="round"/>
          <circle cx="130" cy="90" r="22" fill="rgba(255,255,255,0.2)"/>
          <rect x="98" y="150" width="64" height="36" rx="8" fill="rgba(255,255,255,0.2)"/>
        </svg>
      </div>

      <h1 class="auth-tagline">Set a New Password</h1>
      <p class="auth-subline">Create a strong password to secure your account.</p>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════
       RIGHT PANEL — Reset Form
  ════════════════════════════════════════════════════════ -->
  <div class="auth-panel-right">
    <div class="auth-form-container">

      <div class="auth-form-header">
        <a href="login.html" class="auth-form-back" aria-label="Back to login">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          Back to Login
        </a>
        <h2 class="auth-form-title">Reset Password</h2>
        <p class="auth-form-subtitle">Enter and confirm your new password.</p>
      </div>

      <div class="auth-form" style="display:flex; flex-direction:column; gap:18px;">
        <div class="form-group">
          <label class="form-label" for="new-password">New Password</label>
          <div class="form-input-icon-wrap">
            <span class="input-icon" aria-hidden="true">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </span>
            <input type="password" id="new-password" class="form-input" placeholder="At least 8 characters" autocomplete="new-password">
            <span class="input-icon-right toggle-pw" data-target="new-password" aria-label="Toggle password visibility" role="button">👁</span>
          </div>
          <span class="form-error" id="err-new-password"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirm-new-password">Confirm Password</label>
          <div class="form-input-icon-wrap">
            <span class="input-icon" aria-hidden="true">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </span>
            <input type="password" id="confirm-new-password" class="form-input" placeholder="Re-enter password" autocomplete="new-password">
            <span class="input-icon-right toggle-pw" data-target="confirm-new-password" aria-label="Toggle password visibility" role="button">👁</span>
          </div>
          <span class="form-error" id="err-confirm-new-password"></span>
        </div>

        <div class="auth-form-actions">
          <button type="button" id="submit-reset" class="btn btn-primary">Update Password</button>
        </div>
      </div>

      <p class="auth-footer-text">Done here? <a href="login.html">Go to login</a></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.50.0/dist/umd/supabase.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
