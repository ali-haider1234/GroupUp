<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — GroupUp | FAST University FYP Partner Finder</title>
  <meta name="description" content="Sign in to GroupUp to find and connect with your FYP group partners at FAST University.">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-body" data-page="login">

  <!-- ── Toast Container ── -->
  <div id="toast-container" class="toast-container"></div>

  <!-- ═══════════════════════════════════════════════════════
       LEFT PANEL — Branding
  ════════════════════════════════════════════════════════ -->
  <div class="auth-panel-left" role="complementary" aria-label="Branding">
    <div class="auth-panel-illustration">

      <!-- Brand -->
      <div class="auth-brand">
        <div class="auth-brand-icon" aria-hidden="true">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="9" cy="7" r="4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="auth-brand-name">GroupUp</span>
      </div>

      <!-- SVG Illustration — Checklist / Progress -->
      <div class="auth-visual" aria-hidden="true">
        <svg viewBox="0 0 260 260" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="130" cy="130" r="110" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
          <!-- Profile cards illustration -->
          <rect x="50" y="70" width="160" height="48" rx="10" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
          <circle cx="76" cy="94" r="14" fill="rgba(255,255,255,0.2)"/>
          <text x="76" y="99" text-anchor="middle" font-size="12" fill="white">👤</text>
          <rect x="100" y="83" width="60" height="6" rx="3" fill="rgba(255,255,255,0.4)"/>
          <rect x="100" y="96" width="40" height="5" rx="2.5" fill="rgba(255,255,255,0.2)"/>
          <circle cx="188" cy="88" r="7" fill="rgba(255,255,255,0.25)" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
          <path d="M185 88 L187 90.5 L191 86" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

          <rect x="50" y="130" width="160" height="48" rx="10" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
          <circle cx="76" cy="154" r="14" fill="rgba(255,255,255,0.2)"/>
          <text x="76" y="159" text-anchor="middle" font-size="12" fill="white">👤</text>
          <rect x="100" y="143" width="70" height="6" rx="3" fill="rgba(255,255,255,0.4)"/>
          <rect x="100" y="156" width="48" height="5" rx="2.5" fill="rgba(255,255,255,0.2)"/>
          <circle cx="188" cy="148" r="7" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1" stroke-dasharray="2 2"/>

          <!-- Connection arc -->
          <path d="M56 190 Q130 210 204 190" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-dasharray="4 3" fill="none"/>
          <circle cx="130" cy="213" r="5" fill="rgba(255,255,255,0.4)"/>
        </svg>
      </div>

      <h1 class="auth-tagline">Welcome Back!</h1>
      <p class="auth-subline">Your FYP group is waiting. Sign in to continue connecting with the right partners.</p>

      <div class="auth-stats">
        <div class="auth-stat">
          <div class="auth-stat-num">24/7</div>
          <div class="auth-stat-label">Available</div>
        </div>
        <div class="auth-stat">
          <div class="auth-stat-num">Free</div>
          <div class="auth-stat-label">Always</div>
        </div>
        <div class="auth-stat">
          <div class="auth-stat-num">FAST</div>
          <div class="auth-stat-label">Exclusive</div>
        </div>
      </div>

    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════
       RIGHT PANEL — Login Form
  ════════════════════════════════════════════════════════ -->
  <div class="auth-panel-right">
    <div class="auth-form-container">

      <div class="auth-form-header">
        <div class="auth-brand" style="margin-bottom:28px; justify-content:flex-start; gap:10px;">
          <div style="width:36px;height:36px;background:var(--blue-500);border-radius:10px;display:flex;align-items:center;justify-content:center;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          </div>
          <span style="font-size:1.2rem;font-weight:800;color:var(--blue-500);letter-spacing:-0.4px">GroupUp</span>
        </div>
        <h2 class="auth-form-title">Sign In</h2>
        <p class="auth-form-subtitle">Enter your FAST University credentials to continue.</p>
      </div>

      <!-- Login Form -->
      <div class="auth-form" id="login-form" style="display:flex; flex-direction:column; gap:18px;">

        <div class="form-group">
          <label class="form-label" for="login-roll">Roll Number</label>
          <div class="form-input-icon-wrap">
            <span class="input-icon" aria-hidden="true">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
            </span>
            <input type="text" id="login-roll" class="form-input" placeholder="23F-0000" maxlength="8"
              autocomplete="username" spellcheck="false"
              style="font-family:'Courier New', monospace; letter-spacing:.04em; text-transform:uppercase"
              aria-label="Roll number" aria-required="true">
          </div>
          <span class="form-error" id="err-login-roll"></span>
        </div>

        <div class="form-group">
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <label class="form-label" for="login-password">Password</label>
            <a href="forgot-password.html" style="font-size:0.78rem;color:var(--blue-500);font-weight:500;" tabindex="0">Forgot password?</a>
          </div>
          <div class="form-input-icon-wrap">
            <span class="input-icon" aria-hidden="true">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </span>
            <input type="password" id="login-password" class="form-input" placeholder="Your password"
              autocomplete="current-password"
              aria-label="Password" aria-required="true">
            <span class="input-icon-right toggle-pw" data-target="login-password" aria-label="Toggle password visibility" role="button" tabindex="0">👁</span>
          </div>
          <span class="form-error" id="err-login-password"></span>
        </div>

        <div style="display:flex; align-items:center; gap:10px;">
          <div class="custom-checkbox" id="remember-checkbox" role="checkbox" aria-checked="false" aria-label="Remember me" tabindex="0" style="width:16px;height:16px;">
            <input type="checkbox" id="remember-me">
          </div>
          <label for="remember-me" style="font-size:0.8125rem;color:var(--gray-500);cursor:pointer;user-select:none">Keep me signed in</label>
        </div>

        <div class="auth-form-actions">
          <button type="button" id="submit-login" class="btn btn-primary" aria-label="Sign in">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
            Sign In
          </button>
        </div>

      </div>

      <!-- Footer -->
      <p class="auth-footer-text">
        Don't have an account? <a href="signup.html">Sign up for free</a>
      </p>

    </div>
  </div>

  <script>
    // Remember me checkbox
    document.getElementById('remember-checkbox').addEventListener('click', function() {
      this.classList.toggle('checked');
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.50.0/dist/umd/supabase.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
